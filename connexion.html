<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Naj'Elle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/user.css"/>
</head>
<body>

<div class="connexion-page">
  <div class="connexion-card">

    <!-- Logo -->
    <div class="connexion-logo">
      <svg width="24" height="44" viewBox="0 0 28 52" fill="none">
        <ellipse cx="14" cy="2.2" rx="2.2" ry="2" fill="#B8860B"/>
        <rect x="12.8" y="4" width="2.4" height="3.5" rx="1.2" fill="#B8860B"/>
        <path d="M8 9C6 10,3 12,4 15C3 18,8 21,10 23C9 26,4 28,5 30C4 33,7 37,8 39L20 39C21 37,24 33,23 30C24 28,19 26,18 23C20 21,25 18,24 15C25 12,22 10,20 9C18 8,16 7.5,14 7.5C12 7.5,10 8,8 9Z" fill="#B8860B"/>
        <rect x="13" y="39" width="2" height="7.5" rx="1" fill="#7A5A08" opacity=".9"/>
        <ellipse cx="14" cy="47.5" rx="5.5" ry="1.6" fill="#7A5A08" opacity=".45"/>
      </svg>
      <span class="connexion-logo-text">Naj<span>'</span>Elle</span>
    </div>
    <p class="connexion-subtitle">Espace client</p>

    <!-- Tabs -->
    <div class="connexion-tabs">
      <button class="connexion-tab active" id="tab-login" onclick="switchTab('login')">Se connecter</button>
      <button class="connexion-tab" id="tab-signup" onclick="switchTab('signup')">Créer un compte</button>
    </div>

    <!-- Google -->
    <button class="btn-google" id="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continuer avec Google
    </button>

    <div class="connexion-sep">ou</div>

    <!-- Form -->
    <form id="connexion-form" novalidate>

      <!-- Prénom (inscription seulement) -->
      <div class="conn-field" id="field-prenom" style="display:none;">
        <label class="conn-label" for="input-prenom">Prénom</label>
        <input class="conn-input" type="text" id="input-prenom" placeholder="Votre prénom" autocomplete="given-name"/>
      </div>

      <div class="conn-field">
        <label class="conn-label" for="input-email">Email</label>
        <input class="conn-input" type="email" id="input-email" placeholder="votre@email.com" autocomplete="email" required/>
      </div>

      <div class="conn-field">
        <label class="conn-label" for="input-password">Mot de passe</label>
        <input class="conn-input" type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>

      <button class="btn-conn-submit" type="submit" id="btn-submit">Se connecter</button>

      <div class="conn-error" id="conn-error"></div>
      <div class="conn-success" id="conn-success"></div>

    </form>

    <div class="connexion-back">
      <a href="/">← Retour au site</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/user-auth.js"></script>
<script>
'use strict';

let currentMode = 'login';

/* Rediriger si déjà connecté */
NajUser.waitForInit().then(() => {
  if (NajUser.isLoggedIn()) {
    const params = new URLSearchParams(location.search);
    location.href = params.get('return') || 'compte.html';
  }
});

function switchTab(mode) {
  currentMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('field-prenom').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('btn-submit').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('conn-error').classList.remove('show');
  document.getElementById('conn-success').classList.remove('show');

  const passInput = document.getElementById('input-password');
  passInput.autocomplete = mode === 'login' ? 'current-password' : 'new-password';
}

async function handleGoogle() {
  showError('Connexion Google bientôt disponible. Utilisez email/mot de passe.');
}

document.getElementById('connexion-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn    = document.getElementById('btn-submit');
  const email  = document.getElementById('input-email').value;
  const pass   = document.getElementById('input-password').value;
  const prenom = document.getElementById('input-prenom').value;

  hideMessages();
  btn.disabled = true;
  btn.textContent = currentMode === 'login' ? 'Connexion…' : 'Création…';

  try {
    if (currentMode === 'login') {
      await NajUser.login(email, pass);
      const params = new URLSearchParams(location.search);
      location.href = params.get('return') || 'compte.html';
    } else {
      const result = await NajUser.signup(email, pass, prenom);
      if (!result.session) {
        /* Confirmation par email requise */
        showSuccess('Compte créé ! Vérifiez votre boîte mail pour confirmer votre adresse.');
      } else {
        location.href = 'compte.html';
      }
    }
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = currentMode === 'login' ? 'Se connecter' : 'Créer mon compte';
  }
});

function showError(msg) {
  const el = document.getElementById('conn-error');
  el.textContent = msg; el.classList.add('show');
}
function showSuccess(msg) {
  const el = document.getElementById('conn-success');
  el.textContent = msg; el.classList.add('show');
}
function hideMessages() {
  document.getElementById('conn-error').classList.remove('show');
  document.getElementById('conn-success').classList.remove('show');
}
</script>
</body>
</html>
